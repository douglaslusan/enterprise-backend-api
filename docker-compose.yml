services:

  api:
    build: .
    container_name: enterprise_api
    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db

    env_file:
      - .env

  db:
    image: postgres:16

    container_name: enterprise_postgres

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: enterprise_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: